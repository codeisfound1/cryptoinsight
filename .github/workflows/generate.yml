name: 🤖 Tạo bài crypto tự động
 
on:
  # Tự động chạy 2 lần mỗi ngày: 7:00 sáng và 19:00 tối (UTC+7)
  schedule:
    - cron: '0 0 * * *'   # 7:00 sáng UTC+7
    - cron: '0 12 * * *'  # 19:00 tối UTC+7
 
  # Chạy thủ công từ GitHub Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: 'Bỏ qua kiểm tra trùng lặp (true/false)'
        required: false
        default: 'false'
 
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Cần để commit posts.json
 
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: 📦 Cài dependencies
        run: npm install
        working-directory: scripts
 
      - name: 🚀 Chạy script tạo bài crypto
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORCE: ${{ github.event.inputs.force }}
          SITE_URL: ${{ secrets.SITE_URL }}
          # Cloudinary (tuỳ chọn) - thêm vào GitHub repo Settings → Secrets
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node scripts/generate.js
 
      - name: 💾 Commit và push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/posts.json docs/sitemap.xml docs/robots.txt
          if git diff --staged --quiet; then
            echo "Không có thay đổi, skip commit."
          else
            git commit -m "🤖 Crypto post: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

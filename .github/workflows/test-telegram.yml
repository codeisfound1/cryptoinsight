name: 🧪 Test Telegram Session

on:
  workflow_dispatch: # Chạy thủ công

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: scripts

      - name: 🔍 Test kết nối Telegram + lấy tin WatcherGuru
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          WATCHER_GURU_CHANNEL: ${{ secrets.WATCHER_GURU_CHANNEL }}
          WATCHER_GURU_LIMIT: ${{ secrets.WATCHER_GURU_LIMIT }}
        run: node scripts/test-telegram.js
